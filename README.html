<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>簡単クイズ</title>
</head>
<body>
    <h1>GitHubクイズ！</h1>
    <p>Q. GitHubの公式マスコットの名前は何？</p>
    
    <button onclick="checkAnswer('A')">A. オクトキャット</button>
    <button onclick="checkAnswer('B')">B. ギットドッグ</button>

    <script>
        function checkAnswer(choice) {
            if (choice === 'A') {
                alert("正解！猫とタコが合体したキャラクターだよ！");
            } else {
                alert("残念！正解はオクトキャットでした。");
            }
        }
    </script>
</body>
</html>
